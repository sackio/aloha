name: Build and push HAOS add-on image

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - main
    paths:
      - "haos-addon/**"
      - "aloha/**"
      - "ui/**"
      - "requirements.txt"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            base: ghcr.io/home-assistant/amd64-base-python:3.12
          - arch: aarch64
            base: ghcr.io/home-assistant/aarch64-base-python:3.12
          - arch: armv7
            base: ghcr.io/home-assistant/armv7-base-python:3.12
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (and push on tag) the ${{ matrix.arch }} add-on image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: haos-addon/Dockerfile
          build-args: BUILD_FROM=${{ matrix.base }}
          platforms: ${{ matrix.arch == 'armv7' && 'linux/arm/v7' || format('linux/{0}', matrix.arch == 'aarch64' && 'arm64' || 'amd64') }}
          push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
          tags: ghcr.io/sackio/aloha-addon:${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
