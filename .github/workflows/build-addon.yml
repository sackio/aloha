name: Build and push HAOS add-on image

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - main
    paths:
      - "haos-addon/**"
      - "aloha/**"
      - "ui/**"
      - "requirements.txt"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            base: ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.18
          - arch: aarch64
            base: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.18
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Version (strip leading v from the tag)
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      # HA convention: the add-on config's image is "…/{arch}-aloha-addon" and the
      # Supervisor pulls "{image}:{version}". So publish per-arch image NAMES with
      # the add-on version as the tag (plus :latest).
      - name: Build (and push on tag) the ${{ matrix.arch }} add-on image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: haos-addon/Dockerfile
          build-args: BUILD_FROM=${{ matrix.base }}
          platforms: ${{ format('linux/{0}', matrix.arch == 'aarch64' && 'arm64' || 'amd64') }}
          push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ghcr.io/sackio/${{ matrix.arch }}-aloha-addon:${{ steps.v.outputs.version }}
            ghcr.io/sackio/${{ matrix.arch }}-aloha-addon:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
